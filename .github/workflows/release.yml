name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts || npm install

    - name: Run all tests
      run: npm run test:all

    - name: Run benchmarks
      run: npm run benchmark

    - name: Verify package
      run: npm pack

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts || npm install

    - name: Build package
      run: npm pack

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Extract changelog
      id: changelog
      run: |
        # Extract changelog for this version
        VERSION="${{ steps.version.outputs.VERSION }}"
        echo "Extracting changelog for version $VERSION"

        # Create release notes
        echo "## Release $VERSION" > release-notes.md
        echo "" >> release-notes.md

        # Try to extract from CHANGELOG.md
        if [ -f CHANGELOG.md ]; then
          sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d' >> release-notes.md || echo "See CHANGELOG.md for details" >> release-notes.md
        else
          echo "See commit history for details" >> release-notes.md
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: '*.tgz'
        body_path: release-notes.md
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts || npm install

    - name: Publish to npm
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      continue-on-error: true

    - name: Publish confirmation
      if: success()
      run: |
        echo "✅ Successfully published to npm!"
        echo "Package: node-tfidf@$(node -p "require('./package.json').version")"

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [create-release, publish-npm]
    if: always()

    steps:
    - name: Check results
      run: |
        echo "GitHub Release: ${{ needs.create-release.result }}"
        echo "npm Publish: ${{ needs.publish-npm.result }}"

        if [ "${{ needs.create-release.result }}" = "success" ]; then
          echo "✅ Release created successfully"
        else
          echo "❌ Release creation failed"
        fi

        if [ "${{ needs.publish-npm.result }}" = "success" ]; then
          echo "✅ Published to npm successfully"
        else
          echo "⚠️ npm publish skipped or failed"
        fi
