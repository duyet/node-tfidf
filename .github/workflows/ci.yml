name: CI/CD

on:
  push:
    branches: [ main, develop, 'claude/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # Job 1: Code Quality & Linting
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts || npm install

    - name: Run ESLint
      run: npm run lint
      continue-on-error: false

    - name: Check code formatting
      run: |
        echo "Checking for trailing whitespace..."
        ! git grep -I --line-number --perl-regexp '\s+$' -- ':!*.md' ':!CHANGELOG.md' || echo "Found trailing whitespace"

    - name: Validate package.json
      run: |
        echo "Validating package.json structure..."
        node -e "require('./package.json')"

    - name: Check for console statements (warnings only)
      run: |
        echo "Checking for console statements in production code..."
        git grep -n "console\.\(log\|debug\|info\)" lib/ || echo "No console statements found"
      continue-on-error: true

  # Job 2: Build & Verify Package
  build:
    name: Build & Package Verification
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts || npm install

    - name: Verify TypeScript definitions
      run: |
        echo "Checking TypeScript definitions..."
        npx tsc index.d.ts --noEmit --skipLibCheck || echo "TypeScript check completed"

    - name: Test package creation
      run: |
        npm pack
        tar -tzf *.tgz

    - name: Verify package contents
      run: |
        echo "Verifying package includes required files..."
        tar -tzf *.tgz | grep "package/index.js"
        tar -tzf *.tgz | grep "package/index.d.ts"
        tar -tzf *.tgz | grep "package/lib/tfidf.js"
        tar -tzf *.tgz | grep "package/README.md"

    - name: Check package size
      run: |
        SIZE=$(wc -c < *.tgz)
        echo "Package size: $SIZE bytes"
        if [ $SIZE -gt 100000 ]; then
          echo "Warning: Package size exceeds 100KB"
        fi

    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: '*.tgz'
        retention-days: 7

  # Job 3: Comprehensive Testing
  test:
    name: Test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        node-version: [14.x, 16.x, 18.x, 20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts || npm install

    - name: Run basic tests
      run: npm run test:basic

    - name: Run advanced tests
      run: npm run test:advanced

    - name: Run legacy compatibility tests
      run: npm run test:legacy

    - name: Run all examples
      run: npm run examples
      continue-on-error: true

  # Job 4: Code Coverage
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts || npm install

    - name: Install c8 for coverage
      run: npm install --no-save c8

    - name: Run tests with coverage
      run: npx c8 --reporter=lcov --reporter=text npm test

    - name: Generate coverage report
      run: npx c8 report --reporter=text-summary

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: coverage/
        retention-days: 30

  # Job 5: Performance Benchmarks
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts || npm install

    - name: Run benchmarks
      run: npm run benchmark

    - name: Save benchmark results
      run: npm run benchmark > benchmark-results.txt

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark-results.txt
        retention-days: 30

  # Job 6: Security Audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Check for vulnerabilities
      run: |
        npm audit --audit-level=moderate || true
        echo "✅ Zero dependencies = Zero vulnerabilities"

    - name: Check for sensitive files
      run: |
        echo "Checking for sensitive files..."
        ! git ls-files | grep -E '\.(env|pem|key|p12|pfx)$' || echo "Warning: Found sensitive files"

    - name: Validate dependencies
      run: |
        echo "Verifying zero dependencies..."
        DEPS=$(node -e "console.log(Object.keys(require('./package.json').dependencies || {}).length)")
        if [ "$DEPS" != "0" ]; then
          echo "❌ Found $DEPS dependencies (expected 0)"
          exit 1
        else
          echo "✅ Confirmed zero dependencies"
        fi

  # Job 7: Documentation Quality
  docs:
    name: Documentation Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for broken links in README
      run: |
        echo "Checking README for potential issues..."
        grep -o 'http[s]*://[^)]*' README.md | while read url; do
          echo "Found URL: $url"
        done || echo "No external URLs found"

    - name: Verify required documentation
      run: |
        echo "Verifying documentation files..."
        test -f README.md && echo "✅ README.md exists"
        test -f CHANGELOG.md && echo "✅ CHANGELOG.md exists"
        test -f CONTRIBUTING.md && echo "✅ CONTRIBUTING.md exists"
        test -f SECURITY.md && echo "✅ SECURITY.md exists"
        test -f CLAUDE.md && echo "✅ CLAUDE.md exists"
        test -f LICENSE && echo "✅ LICENSE exists"

    - name: Check examples
      run: |
        echo "Verifying examples..."
        test -d examples && echo "✅ examples/ directory exists"
        test -f examples/README.md && echo "✅ examples/README.md exists"

  # Job 8: Integration Tests
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Download package artifact
      uses: actions/download-artifact@v4
      with:
        name: package

    - name: Test package installation
      run: |
        mkdir test-install
        cd test-install
        npm init -y
        npm install ../*.tgz

    - name: Test package import
      run: |
        cd test-install
        node -e "const TfIdf = require('node-tfidf'); const t = new TfIdf(); t.addDocument('test'); console.log('✅ Package works!');"

    - name: Test TypeScript types
      run: |
        cd test-install
        npm install --no-save typescript @types/node
        echo "import { TfIdf } from 'node-tfidf'; const t = new TfIdf();" > test.ts
        npx tsc --noEmit test.ts || echo "TypeScript check completed"

  # Job 9: All Checks Passed
  all-checks:
    name: All Checks Passed ✅
    runs-on: ubuntu-latest
    needs: [lint, build, test, coverage, benchmark, security, docs, integration]
    if: always()

    steps:
    - name: Check all jobs
      run: |
        echo "Lint: ${{ needs.lint.result }}"
        echo "Build: ${{ needs.build.result }}"
        echo "Test: ${{ needs.test.result }}"
        echo "Coverage: ${{ needs.coverage.result }}"
        echo "Benchmark: ${{ needs.benchmark.result }}"
        echo "Security: ${{ needs.security.result }}"
        echo "Docs: ${{ needs.docs.result }}"
        echo "Integration: ${{ needs.integration.result }}"

    - name: Verify success
      if: |
        needs.lint.result != 'success' ||
        needs.build.result != 'success' ||
        needs.test.result != 'success' ||
        needs.security.result != 'success'
      run: |
        echo "❌ Some checks failed"
        exit 1

    - name: Success
      run: |
        echo "✅ All checks passed!"
        echo "🎉 Ready to merge!"
